<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Order</title>
</head>
<body>
    <script src="script.js"></script>
    <h1>Order Form</h1>
    <form onsubmit="return printReceipt()">
        <label for="fullName">Full Name: </label>
        <input type="text" id="fullName" name="fullName" required><br>
        <label for="gradeSection">Grade and Section: </label>
        <input type="text" id="gradeSection" name="gradeSection" required><br><br>
        <label for="meal">Meal: </label>
        <select id="meal" name="meal">
            <option value="Chicken meal (PHP 75)">Chicken meal (PHP 75)</option>
            <option value="Pork meal (PHP 85)">Pork meal (PHP 85)</option>
            <option value="Beef meal (PHP 105)">Beef meal (PHP 105)</option>
        </select><br>
        <label for="qty">Quantity: (Max of 5) </label>
        <input type="number" id="qty" name="qty" min="0" max="5" required><br><br>

        <label for="custType">Customer Type: </label><br>
        <select id="custType" name="custType">
            <option value="Student">Student</option>
            <option value="Faculty/Staff">Faculty/Staff</option>
        </select><br><br>
        <input type="submit" value="Place Order">
    </form>
    <h1>Order Summary</h1>
    <p id="receipt"></p>
</body>
</html>
